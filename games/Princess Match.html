<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Princess Match</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --night-deep: #1c1530;
    --night-mid: #2a2045;
    --night-light: #382c5c;
    --velvet: #2f2350;
    --velvet-light: #3c2f5e;
    --parchment: #f7eedd;
    --gold: #d4af37;
    --gold-bright: #f0d488;
    --gold-dark: #a9842a;
    --rose: #e8788f;
    --rose-deep: #c0506a;
    --gem: #6fcfd1;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at top, var(--night-light) 0%, var(--night-deep) 75%);
    font-family: 'Quicksand', sans-serif;
    color: var(--parchment);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 10px;
  }

  /* Faint gold sparkle-dust over the whole board, purely decorative */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.07;
    background-image: radial-gradient(circle, var(--gold-bright) 1px, transparent 1.5px);
    background-size: 26px 26px;
  }

  .frame {
    width: 100%;
    max-width: 760px;
    border: 12px solid var(--gold-dark);
    border-image: linear-gradient(160deg, var(--gold-bright), var(--gold-dark) 60%, var(--gold)) 1;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.55), inset 0 0 0 4px rgba(0,0,0,0.25);
    padding: 28px 16px 32px;
    position: relative;
    background: linear-gradient(180deg, var(--night-mid), var(--night-deep));
  }

  h1 {
    font-family: 'Berkshire Swash', cursive;
    font-weight: 400;
    text-align: center;
    font-size: 2.8rem;
    margin: 0 0 4px;
    color: var(--gold-bright);
    text-shadow: 0 2px 8px rgba(212,175,55,0.4), 0 2px 0 rgba(0,0,0,0.3);
    letter-spacing: 1px;
  }

  .subtitle {
    text-align: center;
    margin: 0 0 24px;
    font-size: 1rem;
    color: var(--rose);
    opacity: 0.95;
    font-weight: 600;
  }

  .hidden { display: none !important; }

  /* ---------- Settings screen ---------- */
  fieldset {
    border: 2px dashed rgba(212,175,55,0.4);
    border-radius: 12px;
    margin: 0 0 18px;
    padding: 14px 16px 16px;
  }

  legend {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.15rem;
    padding: 0 8px;
    color: var(--gold-bright);
  }

  .option-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .option-row label {
    flex: 1;
    min-width: 110px;
    text-align: center;
    padding: 10px 8px;
    border-radius: 10px;
    border: 2px solid rgba(247,238,221,0.25);
    cursor: pointer;
    font-weight: 600;
    font-family: 'Fredoka', sans-serif;
    transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
    user-select: none;
    color: var(--parchment);
  }

  .option-row label:hover { transform: translateY(-1px); }

  .option-row input { display: none; }

  .option-row label:has(input:checked) {
    background: var(--gold);
    color: #2a1d05;
    border-color: var(--gold-bright);
  }

  .start-button, .secondary-button, .primary-wide {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.25rem;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    padding: 12px 20px;
    transition: transform 0.12s ease, filter 0.15s ease;
  }

  .start-button, .primary-wide {
    width: 100%;
    background: linear-gradient(160deg, var(--gold-bright), var(--gold));
    color: #3a2705;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }

  .start-button:hover, .primary-wide:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .start-button:active, .primary-wide:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

  /* ---------- Game screen ---------- */
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 18px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.1rem;
  }

  .status-pill {
    background: rgba(212,175,55,0.1);
    border: 2px dashed rgba(212,175,55,0.4);
    border-radius: 999px;
    padding: 6px 16px;
  }

  .status-pill b { color: var(--gold-bright); }

  .header-buttons { display: flex; gap: 8px; }

  .secondary-button {
    background: transparent;
    color: var(--parchment);
    border: 2px solid rgba(212,175,55,0.5) !important;
    font-size: 0.95rem;
    padding: 8px 14px;
  }

  .secondary-button:hover { background: rgba(212,175,55,0.12); }

  /* ---------- Board / tiles ---------- */
  #board {
    display: grid;
    gap: 9px;
    grid-template-columns: repeat(4, 1fr);
  }

  #board.board-16 {
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  #board.board-24 {
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
  }

  @media (orientation: landscape) and (min-width: 640px) {
    #board.board-24 { grid-template-columns: repeat(6, 1fr); }
  }

  .tile {
    position: relative;
    aspect-ratio: 1 / 1;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    perspective: 600px;
  }

  .tile:disabled { cursor: default; }

  .tile-inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(.2,.8,.2,1);
  }

  .tile.is-flipped .tile-inner { transform: rotateY(180deg); }

  .tile.is-wrong .tile-inner { animation: shake 0.4s ease; }

  @keyframes shake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-6px); }
    75% { transform: rotateY(180deg) translateX(6px); }
  }

  .tile-face {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    backface-visibility: hidden;
    overflow: hidden;
  }

  .tile-front {
    background: linear-gradient(160deg, var(--velvet-light), var(--velvet));
    border: 2px solid rgba(212,175,55,0.5);
  }

  .tile-front-locket {
    width: 58%;
    height: 58%;
    border-radius: 50%;
    border: 2.5px solid var(--gold);
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.15), transparent 60%), var(--night-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 4px rgba(212,175,55,0.15);
  }

  .tile-front-locket svg { width: 38%; height: 38%; }

  .tile-back {
    background: var(--night-mid);
    border: 2px solid var(--gold);
    transform: rotateY(180deg);
  }

  .tile-back .portrait-frame {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--parchment);
  }

  .tile-back .portrait-frame img { width: 100%; height: 100%; display: block; object-fit: contain; }

  #board.board-24 .tile-back,
  #board.board-24 .tile-front-locket { border-width: 1.5px; }

  .tile.is-matched .tile-back {
    border-color: var(--gem);
    box-shadow: inset 0 0 0 2px var(--gem), 0 0 0 3px rgba(111,207,209,0.35);
  }

  .tile.is-matched .tile-back::after {
    content: "✓";
    position: absolute;
    top: 2px;
    right: 6px;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--gem);
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    z-index: 1;
  }

  .tile.is-wrong .tile-back {
    border-color: var(--rose-deep);
  }

  /* ---------- Win overlay ---------- */
  #win-overlay {
    position: absolute;
    inset: 14px;
    background: rgba(28, 21, 48, 0.95);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  #win-overlay h2 {
    font-family: 'Berkshire Swash', cursive;
    font-weight: 400;
    font-size: 2.1rem;
    margin: 0 0 8px;
    color: var(--gold-bright);
  }

  #win-overlay p {
    margin: 0 0 22px;
    font-size: 1.05rem;
    color: var(--parchment);
  }

  #win-overlay .primary-wide { max-width: 240px; }

  @media (max-width: 420px) {
    h1 { font-size: 2.1rem; }
  }
</style>
</head>
<body>

<div class="frame">
  <h1>Princess Match</h1>
  <p class="subtitle">Flip two lockets. Find each matching pair.</p>

  <!-- SETTINGS SCREEN -->
  <section id="settings-screen">
    <fieldset>
      <legend>Pairs</legend>
      <div class="option-row">
        <label><input type="radio" name="pairs" value="4" checked><span>4 pairs<br><small>8 tiles</small></span></label>
        <label><input type="radio" name="pairs" value="8"><span>8 pairs<br><small>16 tiles</small></span></label>
        <label><input type="radio" name="pairs" value="12"><span>12 pairs<br><small>24 tiles</small></span></label>
      </div>
    </fieldset>

    <button id="start-button" class="start-button">Start Game</button>
  </section>

  <!-- GAME SCREEN -->
  <section id="game-screen" class="hidden">
    <div class="game-header">
      <div class="status-pill">Matched: <b id="status-matched">0 / 4</b></div>
      <div class="status-pill">Tries: <b id="status-attempts">0</b></div>
      <div class="header-buttons">
        <button id="new-game-button" class="secondary-button">New Game</button>
        <button id="change-settings-button" class="secondary-button">Settings</button>
      </div>
    </div>

    <div id="board"></div>

    <div id="win-overlay" class="hidden">
      <h2>👑 You matched them all!</h2>
      <p id="win-summary">It took <b id="win-attempts">0</b> tries.</p>
      <button id="play-again-button" class="primary-wide">Play Again</button>
      <br>
      <button id="back-to-settings-button" class="secondary-button" style="margin-top:10px;">Change Settings</button>
    </div>
  </section>
</div>

<script>

 *   3. Sound effects        — chime / thud / win song, built from scratch (no audio files)
 *   4. Puzzle generation    — builds a fresh, shuffled set of tiles
 *   5. Rendering             — turning game state into on-screen HTML
 *   6. Event handling       — what happens when you click things

 * milliseconds. Kept generous so there's time to look at both pictures
 * before they disappear again.
 */
const MISMATCH_DISPLAY_MS = 2200;

 * How long the final correct pair stays visible on the board before the

 */
const WIN_OVERLAY_DELAY_MS = 2500;
