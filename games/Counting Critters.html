<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Counting Critters" />
  <title>Counting Critters – Addition Adventure!</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#b8eeff 0%,#d4f5b0 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
    .clouds{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:0;}
    .cloud{position:absolute;background:white;border-radius:50px;opacity:0.7;animation:drift linear infinite;}
    .cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%;}
    .cloud-1{width:120px;height:40px;top:30px;animation-duration:28s;animation-delay:-5s;}
    .cloud-1::before{width:60px;height:60px;top:-30px;left:15px;}
    .cloud-1::after{width:40px;height:40px;top:-20px;left:55px;}
    .cloud-2{width:90px;height:30px;top:80px;animation-duration:22s;animation-delay:-12s;}
    .cloud-2::before{width:45px;height:45px;top:-22px;left:10px;}
    .cloud-2::after{width:35px;height:35px;top:-15px;left:40px;}
    .cloud-3{width:140px;height:45px;top:50px;animation-duration:35s;animation-delay:-20s;}
    .cloud-3::before{width:70px;height:70px;top:-35px;left:20px;}
    .cloud-3::after{width:50px;height:50px;top:-25px;left:65px;}
    @keyframes drift{from{transform:translateX(-200px);}to{transform:translateX(110vw);}}
    header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px;width:100%;}
    header h1{font-family:'Fredoka One',cursive;font-size:clamp(2rem,6vw,3.2rem);color:#2d5a1b;text-shadow:3px 3px 0 rgba(255,255,255,0.6);letter-spacing:1px;}
    .subtitle{font-size:clamp(0.9rem,3vw,1.1rem);color:#4a7c59;font-weight:700;}
    .progress-bar-wrap{position:relative;z-index:10;width:min(600px,92vw);background:rgba(255,255,255,0.5);border-radius:30px;height:22px;margin:8px auto 4px;overflow:hidden;border:2px solid rgba(255,255,255,0.8);}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,#6BCB77,#FFD93D);border-radius:30px;transition:width 0.5s ease;}
    .score-row{display:flex;justify-content:space-between;align-items:center;width:min(600px,92vw);margin:0 auto 6px;font-size:0.95rem;font-weight:700;color:#3a6e2a;position:relative;z-index:10;}
    .level-row{display:flex;gap:10px;justify-content:center;margin-bottom:6px;position:relative;z-index:10;}
    .level-btn{font-family:'Fredoka One',cursive;font-size:1rem;padding:8px 22px;border:none;border-radius:40px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 0 rgba(0,0,0,0.18);}
    .level-btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,0.18);}
    .level-btn.easy{background:#6BCB77;color:white;}
    .level-btn.medium{background:#FFB347;color:white;}
    .level-btn.hard{background:#FF6B6B;color:white;}
    .level-btn.active{outline:4px solid #2d5a1b;transform:scale(1.08);}
    .stop-btn{font-family:'Fredoka One',cursive;font-size:1rem;padding:8px 24px;background:#FF6B6B;color:white;border:none;border-radius:40px;cursor:pointer;box-shadow:0 4px 0 #b03030;display:block;margin:0 auto 10px;position:relative;z-index:10;}
    .stop-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #b03030;}
    .main-card{background:rgba(255,255,255,0.82);backdrop-filter:blur(6px);border-radius:32px;padding:clamp(16px,4vw,32px);width:min(660px,94vw);box-shadow:0 8px 32px rgba(0,0,0,0.12),0 0 0 3px rgba(255,255,255,0.5);position:relative;z-index:10;margin-bottom:20px;}
    .equation-display{text-align:center;font-family:'Fredoka One',cursive;font-size:clamp(2.5rem,8vw,4rem);color:#1a3a0a;margin-bottom:8px;letter-spacing:4px;min-height:60px;}
    .eq-num{color:#2d5a1b;}
    .eq-op{color:#FF6B6B;}
    .eq-eq{color:#A78BFA;}
    .eq-blank{display:inline-block;min-width:60px;border-bottom:5px solid #A78BFA;vertical-align:bottom;margin:0 4px;}
    .eq-answer{color:#FFB347;display:none;}
    .eq-answer.show{display:inline;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes popIn{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;}}
    .animal-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin:8px 0 14px;min-height:90px;}
    .animal-group{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:280px;}
    .plus-symbol{font-family:'Fredoka One',cursive;font-size:3rem;color:#FF6B6B;padding:0 6px;align-self:center;}
    .animal-square{width:clamp(42px,9vw,64px);height:clamp(42px,9vw,64px);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:clamp(1.6rem,5vw,2.4rem);box-shadow:0 4px 10px rgba(0,0,0,0.12);animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;border:3px solid rgba(255,255,255,0.8);}
    .sq-color-0{background:#FFE4E1;}.sq-color-1{background:#E1F5E1;}.sq-color-2{background:#E1E8FF;}
    .sq-color-3{background:#FFF3E1;}.sq-color-4{background:#F3E1FF;}.sq-color-5{background:#E1FFFA;}
    .answer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;}
    .answer-btn{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,6vw,2.8rem);padding:16px 10px;border:none;border-radius:20px;cursor:pointer;background:linear-gradient(135deg,#fff7e6,#fff0c8);color:#3a2000;box-shadow:0 6px 0 #d4a800,0 8px 16px rgba(0,0,0,0.12);transition:transform 0.12s,box-shadow 0.12s;}
    .answer-btn:not(:disabled):hover{transform:translateY(-3px);box-shadow:0 9px 0 #d4a800,0 12px 20px rgba(0,0,0,0.15);}
    .answer-btn:not(:disabled):active{transform:translateY(3px);box-shadow:0 3px 0 #d4a800;}
    .answer-btn:disabled{cursor:default;}
    .answer-btn.correct{background:linear-gradient(135deg,#b8f5b0,#6BCB77)!important;color:white!important;box-shadow:0 6px 0 #3a8c41!important;animation:correctPulse 0.5s ease;}
    .answer-btn.wrong{background:linear-gradient(135deg,#ffc0c0,#FF6B6B)!important;color:white!important;box-shadow:0 6px 0 #c03030!important;animation:shake 0.4s ease;}
    @keyframes correctPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
    @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
    .feedback-banner{text-align:center;font-family:'Fredoka One',cursive;font-size:clamp(1.3rem,4vw,1.9rem);padding:12px 16px;border-radius:16px;margin-top:12px;min-height:60px;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
    .feedback-banner.correct{background:#d4f7d0;color:#1a6a20;}
    .feedback-banner.wrong{background:#ffe0e0;color:#a02020;}
    .feedback-banner.empty{background:transparent;}
    .confetti-piece{position:fixed;width:12px;height:12px;border-radius:3px;pointer-events:none;animation:confettiFall 1.8s ease-in forwards;z-index:100;}
    @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
    #game-over{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;}
    #game-over.show{display:flex;}
    .game-over-card{background:white;border-radius:32px;padding:40px 36px;text-align:center;max-width:380px;width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);}
    .game-over-card h2{font-family:'Fredoka One',cursive;font-size:2.4rem;color:#2d5a1b;margin-bottom:8px;}
    .final-score{font-family:'Fredoka One',cursive;font-size:5rem;color:#FF6B6B;line-height:1;}
    .final-label{font-size:1.1rem;color:#666;font-weight:700;margin-bottom:24px;}
    .play-again-btn{font-family:'Fredoka One',cursive;font-size:1.6rem;padding:16px 48px;background:linear-gradient(135deg,#6BCB77,#3da84a);color:white;border:none;border-radius:40px;cursor:pointer;box-shadow:0 6px 0 #2a7a35;transition:transform 0.12s,box-shadow 0.12s;}
    .play-again-btn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #2a7a35;}
    .play-again-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #2a7a35;}
    #start-screen{position:fixed;inset:0;background:linear-gradient(180deg,#b8eeff 0%,#d4f5b0 100%);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;}
    #start-screen h1{font-family:'Fredoka One',cursive;font-size:clamp(2.5rem,8vw,4rem);color:#2d5a1b;text-align:center;text-shadow:3px 3px 0 rgba(255,255,255,0.7);}
    .start-animals{font-size:clamp(2.5rem,8vw,4rem);letter-spacing:10px;animation:bounce 1s ease infinite alternate;}
    @keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-16px);}}
    .start-desc{font-size:clamp(1rem,3vw,1.3rem);color:#3a6e2a;font-weight:700;text-align:center;max-width:380px;line-height:1.5;}
    .start-btn{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,5vw,2rem);padding:18px 60px;background:linear-gradient(135deg,#FFD93D,#FFB347);color:#3a2000;border:none;border-radius:50px;cursor:pointer;box-shadow:0 7px 0 #c07800,0 12px 24px rgba(0,0,0,0.15);transition:transform 0.12s,box-shadow 0.12s;}
    .start-btn:hover{transform:translateY(-3px);}
    .start-btn:active{transform:translateY(4px);box-shadow:0 3px 0 #c07800;}
    .speech-indicator{display:inline-flex;align-items:center;gap:4px;margin-left:8px;vertical-align:middle;}
    .speech-dot{width:7px;height:7px;border-radius:50%;background:#A78BFA;animation:pulse 0.6s ease infinite alternate;}
    .speech-dot:nth-child(2){animation-delay:0.2s;}.speech-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes pulse{from{transform:scaleY(0.5);opacity:0.4;}to{transform:scaleY(1.4);opacity:1;}}
    #speech-indicator-wrap{display:none;margin-top:6px;text-align:center;color:#6a4aaa;font-weight:700;font-size:0.9rem;}
    #speech-indicator-wrap.active{display:block;}
    #voice-info{font-size:0.72rem;color:#aaa;text-align:center;margin-bottom:4px;min-height:14px;position:relative;z-index:10;}
  </style>
</head>
<body>

<div id="start-screen">
  <div class="start-animals">🐱 🐶 🐸 🐰</div>
  <h1>Counting Critters!</h1>
  <p class="start-desc">Listen to the animals add up numbers, then pick the right answer! 🎉</p>
  <button class="start-btn" onclick="startGame()">▶ Let's Play!</button>
</div>

<div class="clouds">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2" style="top:70px;"></div>
  <div class="cloud cloud-3" style="top:20px;"></div>
</div>

<header>
  <h1>🌟 Counting Critters! 🌟</h1>
  <div class="subtitle">Addition Adventure</div>
</header>

<div class="score-row">
  <span id="problem-label">Problem 1 of 10</span>
  <span id="score-label">⭐ Score: 0</span>
</div>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
</div>

<div class="level-row">
  <button class="level-btn easy active" onclick="setLevel('easy')"  id="btn-easy">😊 Easy</button>
  <button class="level-btn medium"      onclick="setLevel('medium')" id="btn-medium">🌟 Medium</button>
  <button class="level-btn hard"        onclick="setLevel('hard')"  id="btn-hard">🔥 Hard</button>
</div>
<button class="stop-btn" onclick="stopGame()">⏹ Stop Game</button>
<div id="voice-info"></div>

<div class="main-card">
  <div class="equation-display" id="equation-display">
    <span class="eq-num" id="num-a">3</span>
    <span class="eq-op"> + </span>
    <span class="eq-num" id="num-b">4</span>
    <span class="eq-eq"> = </span>
    <span class="eq-blank" id="eq-blank"></span><span class="eq-answer" id="eq-answer"></span>
  </div>
  <div id="speech-indicator-wrap">
    🔊 Listening...
    <span class="speech-indicator">
      <span class="speech-dot"></span>
      <span class="speech-dot"></span>
      <span class="speech-dot"></span>
    </span>
  </div>
  <div class="animal-row" id="animal-row"></div>
  <div class="answer-grid" id="answer-grid"></div>
  <div class="feedback-banner empty" id="feedback-banner"></div>
</div>

<div id="game-over">
  <div class="game-over-card">
    <div style="font-size:3rem;margin-bottom:8px;">🎊</div>
    <h2 id="game-over-title">Game Over!</h2>
    <div class="final-score" id="final-score">0</div>
    <div class="final-label" id="final-label">out of 10 correct</div>
    <div id="final-message" style="font-size:1.1rem;color:#555;margin-bottom:20px;font-weight:700;"></div>
    <button class="play-again-btn" onclick="restartGame()">🔄 Play Again!</button>
  </div>
</div>

<script>
const ANIMALS=['🐱','🐶','🐸','🐰','🦊','🐻','🐼','🐨','🦁','🐯','🐮','🐷','🦋','🐢','🦜','🐳','🦄','🐝'];
const CONGRATS=['Yay!','Correct!','Yes!','Bravo!','Right!','Perfect!','Great!'];
const ENCOURAGE=['Try again!','Not quite!','Almost!','Keep trying!'];
const COLORS=['sq-color-0','sq-color-1','sq-color-2','sq-color-3','sq-color-4','sq-color-5'];
const MAXES={easy:5,medium:10,hard:20};

let level='easy',numA=0,numB=0,correct=0,score=0,problemNum=0,readTimer=null,animalA,animalB;
let chosenVoice=null;

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rnd(0,arr.length-1)];}
function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

function scoreVoice(v){
  const n=v.name.toLowerCase();
  let s=0;
  if(v.lang==='en-US') s+=60;
  else if(v.lang.startsWith('en-')) s+=10;
  else if(v.lang.startsWith('en')) s+=5;
  else s-=50;
  if(/\b(ava|samantha|allison|zoe|aria|jenny|ana|emma|michelle|siri)\b/.test(n)) s+=80;
  if(/female|girl|woman/.test(n)) s+=40;
  if(/\b(daniel|thomas|alex|fred|ralph|albert|oliver|lee|bruce|tom|david|george|james|aaron|arthur|richard|mark|guy|reed|ryan|eric|liam)\b/.test(n)) s-=300;
  if(/en-gb|en-au|en-in|en-ie|en-nz/.test(v.lang.toLowerCase())) s-=40;
  return s;
}

function pickBestVoice(){
  const vs=window.speechSynthesis.getVoices();
  if(!vs.length) return null;
  const scored=vs.map(v=>({v,s:scoreVoice(v)})).sort((a,b)=>b.s-a.s);
  const best=scored[0].v;
  document.getElementById('voice-info').textContent='Voice: '+best.name+' ('+best.lang+')';
  return best;
}

function speak(txt,cb){
  if(!window.speechSynthesis){if(cb)cb();return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.72;u.pitch=1.7;
  if(chosenVoice) u.voice=chosenVoice;
  const ind=document.getElementById('speech-indicator-wrap');
  ind.classList.add('active');
  u.onend=()=>{ind.classList.remove('active');if(cb)cb();};
  u.onerror=()=>{ind.classList.remove('active');if(cb)cb();};
  window.speechSynthesis.speak(u);
}

function speakEquation(){speak(`${numA} plus ${numB} equals`);}
function startRepeatTimer(){clearInterval(readTimer);readTimer=setInterval(speakEquation,5000);}

function setLevel(lv){
  level=lv;
  ['easy','medium','hard'].forEach(l=>document.getElementById('btn-'+l).classList.toggle('active',l===lv));
  restartGame();
}

function buildAnswers(c,mx){
  const s=new Set([c]);
  while(s.size<4){const v=rnd(Math.max(0,c-4),Math.min(mx*2,c+5));if(v!==c)s.add(v);}
  return shuffle([...s]);
}

function showAnswer(){
  document.getElementById('eq-blank').style.display='none';
  const a=document.getElementById('eq-answer');
  a.textContent=correct;a.classList.add('show');
}

function hideAnswer(){
  document.getElementById('eq-blank').style.display='';
  const a=document.getElementById('eq-answer');
  a.textContent='';a.classList.remove('show');
}

function renderAnimals(){
  const row=document.getElementById('animal-row');row.innerHTML='';
  const gA=document.createElement('div');gA.className='animal-group';
  const gB=document.createElement('div');gB.className='animal-group';
  const ps=document.createElement('span');ps.className='plus-symbol';ps.textContent='+';
  const cA=pick(COLORS),cB=pick(COLORS.filter(c=>c!==cA));
  for(let i=0;i<numA;i++){const s=document.createElement('div');s.className='animal-square '+cA;s.style.animationDelay=(i*0.07)+'s';s.textContent=animalA;gA.appendChild(s);}
  for(let i=0;i<numB;i++){const s=document.createElement('div');s.className='animal-square '+cB;s.style.animationDelay=(i*0.07)+'s';s.textContent=animalB;gB.appendChild(s);}
  row.appendChild(gA);row.appendChild(ps);row.appendChild(gB);
}

function newProblem(){
  clearInterval(readTimer);
  const mx=MAXES[level];
  numA=rnd(1,mx);numB=rnd(1,mx);correct=numA+numB;
  animalA=pick(ANIMALS);do{animalB=pick(ANIMALS);}while(animalB===animalA);
  document.getElementById('num-a').textContent=numA;
  document.getElementById('num-b').textContent=numB;
  document.getElementById('problem-label').textContent='Problem '+problemNum+' of 10';
  document.getElementById('progress-fill').style.width=((problemNum-1)/10*100)+'%';
  const fb=document.getElementById('feedback-banner');fb.textContent='';fb.className='feedback-banner empty';
  hideAnswer();
  renderAnimals();
  const grid=document.getElementById('answer-grid');grid.innerHTML='';
  buildAnswers(correct,mx).forEach(val=>{
    const btn=document.createElement('button');
    btn.className='answer-btn';btn.textContent=val;
    btn.onclick=()=>handleAnswer(val,btn);
    grid.appendChild(btn);
  });
  setTimeout(()=>{speakEquation();startRepeatTimer();},400);
}

function handleAnswer(val,btn){
  clearInterval(readTimer);
  window.speechSynthesis.cancel();
  document.getElementById('speech-indicator-wrap').classList.remove('active');
  const all=document.querySelectorAll('.answer-btn');
  const fb=document.getElementById('feedback-banner');
  if(val===correct){
    btn.classList.add('correct');
    all.forEach(b=>b.disabled=true);
    score++;
    document.getElementById('score-label').textContent='⭐ Score: '+score;
    showAnswer();
    const msg=pick(CONGRATS);
    fb.textContent='🎉 '+msg;fb.className='feedback-banner correct';
    launchConfetti();
    speak(msg,()=>{setTimeout(()=>{if(problemNum>=10)endGame();else{problemNum++;newProblem();}},800);});
  } else {
    btn.classList.add('wrong');btn.disabled=true;
    const msg=pick(ENCOURAGE);
    fb.textContent='💪 '+msg;fb.className='feedback-banner wrong';
    speak(msg,()=>startRepeatTimer());
  }
}

function launchConfetti(){
  const cols=['#FFD93D','#6BCB77','#FF6B6B','#A78BFA','#FFB347','#4fc3f7'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=Math.random()*100+'vw';p.style.top='-20px';
    p.style.background=pick(cols);p.style.animationDelay=(Math.random()*0.8)+'s';
    p.style.animationDuration=(1.2+Math.random()*0.8)+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),2500);
  }
}

function stopGame(){
  clearInterval(readTimer);
  window.speechSynthesis.cancel();
  document.getElementById('game-over-title').textContent='Game Stopped!';
  document.getElementById('final-score').textContent=score;
  document.getElementById('final-label').textContent='out of '+(problemNum-1)+' played';
  document.getElementById('final-message').textContent='Good effort! Come back and play again soon!';
  document.getElementById('game-over').classList.add('show');
  setTimeout(()=>speak('Game stopped! Good job!'),300);
}

function endGame(){
  clearInterval(readTimer);
  window.speechSynthesis.cancel();
  document.getElementById('game-over-title').textContent='Game Over!';
  document.getElementById('final-score').textContent=score;
  document.getElementById('final-label').textContent='out of 10 correct';
  const msg=score===10?'Perfect score!':score>=7?'You are a math star!':score>=4?'Great effort!':'Keep practicing!';
  document.getElementById('final-message').textContent=msg;
  document.getElementById('game-over').classList.add('show');
  launchConfetti();
  setTimeout(()=>speak('Game over! '+msg),400);
}

function restartGame(){
  clearInterval(readTimer);
  window.speechSynthesis.cancel();
  document.getElementById('game-over').classList.remove('show');
  score=0;problemNum=1;
  document.getElementById('score-label').textContent='⭐ Score: 0';
  document.getElementById('progress-fill').style.width='0%';
  newProblem();
}

function initVoices(cb){
  if(!window.speechSynthesis){cb();return;}
  const vs=window.speechSynthesis.getVoices();
  if(vs.length){chosenVoice=pickBestVoice();cb();}
  else{window.speechSynthesis.onvoiceschanged=()=>{chosenVoice=pickBestVoice();cb();};}
}

function startGame(){
  document.getElementById('start-screen').style.display='none';
  initVoices(()=>{score=0;problemNum=1;newProblem();});
}
