<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find the Letter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffef7; font-family: Arial, sans-serif; }
#root {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 1.25rem 1rem 2rem;
  min-height: 520px;
  background: transparent;
}
#title {
  font-size: 32px;
  font-weight: bold;
  background: linear-gradient(90deg,#e2445c,#f5a623,#27ae60,#2980b9,#8e44ad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.4rem;
  letter-spacing: 1px;
}
#score-bar {
  font-size: 15px;
  color: #666;
  margin-bottom: 0.8rem;
  min-height: 22px;
}
#letter-box {
  width: 190px;
  height: 190px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1rem;
  transition: background 0.4s;
  background: #f0f0f0;
  border: 3px solid #ccc;
}
#big-letter {
  font-size: 130px;
  font-weight: bold;
  line-height: 1;
  transition: color 0.4s;
  color: #333;
}
#message {
  font-size: 24px;
  font-weight: bold;
  min-height: 34px;
  margin-bottom: 0.5rem;
}
#prompt {
  font-size: 16px;
  color: #555;
  min-height: 22px;
  margin-bottom: 1rem;
}
#start-btn, #play-again-btn, #quit-btn {
  font-size: 18px;
  padding: 12px 32px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  font-family: Arial, sans-serif;
  font-weight: bold;
  color: #fff;
  margin: 4px;
}
#start-btn { background: #27ae60; }
#start-btn:hover { background: #219150; }
#play-again-btn { background: #2980b9; }
#play-again-btn:hover { background: #1f6899; }
#quit-btn { background: #e2445c; }
#quit-btn:hover { background: #c0334a; }
#keyboard {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  max-width: 600px;
  margin: 0 auto 1rem;
}
.key-btn {
  width: 46px;
  height: 46px;
  font-size: 19px;
  font-weight: bold;
  border-radius: 10px;
  border: 2.5px solid transparent;
  cursor: pointer;
  font-family: Arial, sans-serif;
  transition: transform 0.07s;
  color: #fff;
}
.key-btn:hover { filter: brightness(1.12); }
.key-btn:active { transform: scale(0.91); }
.key-btn.correct { background: #27ae60 !important; border-color: #1a8a4a !important; color: #fff !important; }
.key-btn.wrong { background: #e2445c !important; border-color: #b0334a !important; color: #fff !important; }
.key-btn:disabled { opacity: 0.55; cursor: default; }
#end-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
}
#end-title { font-size: 28px; font-weight: bold; color: #333; }
#end-score { font-size: 20px; color: #555; }
#btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 0.5rem; }
</style>
</head>
<body>
<div id="root">
  <div id="title">Find the Letter</div>
  <div id="score-bar"></div>
  <div id="letter-box"><span id="big-letter">?</span></div>
  <div id="message"></div>
  <div id="prompt"></div>
  <div id="start-area">
    <button id="start-btn" onclick="startGame()">Play!</button>
  </div>
  <div id="keyboard"></div>
  <div id="btn-row" style="display:none">
    <button id="quit-btn" onclick="quitGame()">Quit</button>
  </div>
  <div id="end-screen">
    <div id="end-title"></div>
    <div id="end-score"></div>
    <button id="play-again-btn" onclick="startGame()">Play Again!</button>
  </div>
</div>

<script>
const CONGRATS = ["Amazing!","Fantastic!","You got it!","Superstar!","Brilliant!","Well done!","Hooray!","Perfect!","Great job!","Wonderful!"];
const COLORS = [
  {bg:'#FFEAEA',fg:'#e2445c'},{bg:'#FFF4E0',fg:'#f5a623'},
  {bg:'#E8F8EE',fg:'#27ae60'},{bg:'#E3F0FB',fg:'#2980b9'},
  {bg:'#F0E8FB',fg:'#8e44ad'},{bg:'#FFF0F5',fg:'#d4537e'},
  {bg:'#E0FAF5',fg:'#0f6e56'},{bg:'#FFF8E0',fg:'#b8860b'}
];
const KEY_COLORS = ['#e2445c','#f5a623','#27ae60','#2980b9','#8e44ad','#d4537e','#0f6e56','#c0392b','#16a085','#7f8c00'];
const TOTAL = 10;

let currentLetter='', round=0, correct=0, gameActive=false, busy=false, colorIdx=0;

function speak(text, onEnd){
  let synth = window.speechSynthesis;
  if (!synth){ if(onEnd) onEnd(); return; }
  synth.cancel();
  function doSpeak(){
    let voices = synth.getVoices();
    let enUS = voices.filter(v => /en.US/i.test(v.lang));
    if(!enUS.length) enUS = voices.filter(v => /^en/i.test(v.lang));
    let preferred = null;
    let girlPats = /samantha|zoe|ava|allison|junior|kate|karen|moira|tessa|fiona|princess|girl|child|young|female|woman/i;
    preferred = enUS.find(v => girlPats.test(v.name));
    if(!preferred) preferred = enUS[0] || voices[0];
    let u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = 0.7;
    u.pitch = 1.6;
    u.volume = 1.0;
    if(preferred) u.voice = preferred;
    if(onEnd) u.onend = onEnd;
    u.onerror = function(){ if(onEnd) onEnd(); };
    synth.speak(u);
  }
  let voices = synth.getVoices();
  if(voices.length){ doSpeak(); }
  else {
    synth.onvoiceschanged = function(){ synth.onvoiceschanged = null; doSpeak(); };
    setTimeout(function(){ doSpeak(); }, 400);
  }
}

function playBeep(){
  try{
    let ctx = new(window.AudioContext||window.webkitAudioContext)();
    let o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.setValueAtTime(150,ctx.currentTime);
    g.gain.setValueAtTime(0.45,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.7);
    o.start(); o.stop(ctx.currentTime+0.7);
  }catch(e){}
}

function playTaDa(){
  try{
    let ctx = new(window.AudioContext||window.webkitAudioContext)();
    [[523,0,0.18],[659,0.19,0.18],[784,0.38,0.42]].forEach(([f,s,d])=>{
      let o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='triangle'; o.frequency.setValueAtTime(f,ctx.currentTime+s);
      g.gain.setValueAtTime(0.35,ctx.currentTime+s);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+s+d);
      o.start(ctx.currentTime+s); o.stop(ctx.currentTime+s+d);
    });
  }catch(e){}
}

function buildKeyboard(enabled){
  let kb=document.getElementById('keyboard');
  kb.innerHTML='';
  for(let i=0;i<26;i++){
    let ch=String.fromCharCode(65+i);
    let btn=document.createElement('button');
    btn.className='key-btn';
    btn.id='key-'+ch;
    btn.textContent=ch;
    btn.disabled=!enabled;
    let c=KEY_COLORS[i%KEY_COLORS.length];
    btn.style.background=c;
    btn.style.borderColor=c;
    btn.onclick=()=>handleGuess(ch);
    kb.appendChild(btn);
  }
}

function setLetterColor(idx){
  let c=COLORS[idx % COLORS.length];
  let box=document.getElementById('letter-box');
  box.style.background=c.bg;
  box.style.border='3px solid '+c.fg;
  document.getElementById('big-letter').style.color=c.fg;
}

function startGame(){
  round=0; correct=0; gameActive=false; busy=false; colorIdx=0;
  document.getElementById('start-area').style.display='none';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('end-screen').style.flexDirection='';
  document.getElementById('btn-row').style.display='flex';
  document.getElementById('keyboard').style.display='flex';
  document.getElementById('big-letter').textContent='?';
  document.getElementById('message').textContent='';
  document.getElementById('prompt').textContent='';
  setLetterColor(0);
  buildKeyboard(false);
  nextRound();
}

function quitGame(){
  gameActive=false; busy=false;
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('keyboard').style.display='none';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('big-letter').textContent='?';
  document.getElementById('score-bar').textContent='';
  document.getElementById('message').textContent='';
  document.getElementById('prompt').textContent='';
  let box=document.getElementById('letter-box');
  box.style.background='#f0f0f0';
  box.style.border='3px solid #ccc';
  document.getElementById('big-letter').style.color='#333';
  let es=document.getElementById('end-screen');
  es.style.display='flex'; es.style.flexDirection='column';
  document.getElementById('end-title').textContent='Come back soon!';
  document.getElementById('end-score').textContent='You got '+correct+' correct so far!';
  speak('Bye bye! Come back soon!', null);
}

function nextRound(){
  if(round>=TOTAL){ endGame(); return; }
  round++;
  colorIdx = (round-1) % COLORS.length;
  currentLetter=String.fromCharCode(65+Math.floor(Math.random()*26));
  document.getElementById('big-letter').textContent=currentLetter;
  setLetterColor(colorIdx);
  document.getElementById('score-bar').textContent='Letter '+round+' of '+TOTAL+'  •  Correct: '+correct;
  document.getElementById('message').textContent='';
  document.getElementById('prompt').textContent='';
  gameActive=false; busy=false;
  buildKeyboard(false);
  speak('The letter is... '+currentLetter, function(){
    if(round>0){
      gameActive=true; busy=false;
      buildKeyboard(true);
      document.getElementById('prompt').textContent='Find the letter '+currentLetter+' and press it!';
    }
  });
}

function handleGuess(ch){
  if(!gameActive || busy) return;
  if(ch===currentLetter){
    busy=true;
    gameActive=false;
    correct++;
    playTaDa();
    let btn=document.getElementById('key-'+ch);
    if(btn){ btn.className='key-btn correct'; btn.disabled=false; }
    let msg=CONGRATS[Math.floor(Math.random()*CONGRATS.length)];
    document.getElementById('message').textContent=msg;
    document.getElementById('message').style.color='#27ae60';
    document.getElementById('prompt').textContent='';
    buildKeyboard(false);
    if(btn){ btn.disabled=false; btn.className='key-btn correct'; }
    document.getElementById('score-bar').textContent='Letter '+round+' of '+TOTAL+'  •  Correct: '+correct;
    speak(msg, function(){ setTimeout(nextRound, 400); });
  } else {
    busy=true;
    playBeep();
    let btn=document.getElementById('key-'+ch);
    if(btn){
      let origBg=btn.style.background;
      btn.className='key-btn wrong';
      setTimeout(()=>{ if(btn){ btn.className='key-btn'; btn.style.background=origBg; } }, 700);
    }
    document.getElementById('message').textContent='Oops! Try again!';
    document.getElementById('message').style.color='#e2445c';
    speak('Oops! Try again!', function(){ busy=false; });
  }
}

document.addEventListener('keydown', function(e){
  if(!gameActive||busy) return;
  let ch=e.key.toUpperCase();
  if(ch.length===1 && ch>='A' && ch<='Z'){
    e.preventDefault();
    handleGuess(ch);
  }
});

function endGame(){
  gameActive=false; busy=false;
  document.getElementById('keyboard').style.display='none';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('score-bar').textContent='';
  document.getElementById('message').textContent='';
  document.getElementById('prompt').textContent='';
  let box=document.getElementById('letter-box');
  box.style.background='#FFF8E0';
  box.style.border='3px solid #f5a623';
  document.getElementById('big-letter').textContent='';
  document.getElementById('big-letter').style.color='#f5a623';
  let es=document.getElementById('end-screen');
  es.style.display='flex'; es.style.flexDirection='column';
  let ending = correct===TOTAL ? 'Perfect score! You are amazing!' : correct>=7 ? 'Great job! You are a star!' : 'Good try! Keep practicing!';
  document.getElementById('end-title').textContent=ending;
  document.getElementById('end-score').textContent='You got '+correct+' out of '+TOTAL+' correct!';
  speak('Game over! You got '+correct+' out of '+TOTAL+' correct! '+ending, null);
}
</script>
</body>
</html>
