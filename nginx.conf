server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve all static files; return 404 if not found
    location / {
        try_files $uri $uri/ =404;
    }

    # Disable access log noise for favicons
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
