<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pap Games</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
      border-bottom: 1px solid #2a2a4a;
    }

    header h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 0.5rem;
      color: #888;
      font-size: 1rem;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .game-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1.75rem 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .game-card:hover {
      transform: translateY(-4px);
      border-color: #7c3aed;
      box-shadow: 0 8px 32px rgba(124, 58, 237, 0.25);
    }

    .game-card .icon {
      font-size: 2.5rem;
      line-height: 1;
    }

    .game-card h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e8e8f0;
    }

    .game-card p {
      font-size: 0.875rem;
      color: #888;
      line-height: 1.5;
    }

    .game-card .play-btn {
      margin-top: auto;
      display: inline-block;
      padding: 0.5rem 1.25rem;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      color: #fff;
      width: fit-content;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #444;
      font-size: 0.8rem;
      border-top: 1px solid #1a1a2e;
    }
  </style>
</head>
<body>

  <header>
    <h1>Pap Games</h1>
    <p>Pick a game and play</p>
  </header>

  <main>
    <div class="games-grid">

      <a class="game-card" href="/games/Pap%20Puzzle.html">
        <div class="icon">🧩</div>
        <h2>Pap Puzzle</h2>
        <p>A classic puzzle game to test your problem-solving skills.</p>
        <span class="play-btn">Play</span>
      </a>

    </div>
  </main>

  <footer>
    &copy; 2026 Pap Games
  </footer>

</body>
</html>
